<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dla Ciebie ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* ✨ Nagłówek */
header {
    padding: 50px 20px 20px;
    font-size: 38px;
    font-weight: bold;
    animation: fadeIn 2s;
}

.love-text {
    font-size: 20px;
    margin: 20px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
}

/* ⏳ licznik */
#timer {
    font-size: 24px;
    margin: 20px;
    font-weight: bold;
}

/* 📸 GALERIA */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    transition: 0.3s;
    cursor: pointer;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* 📸 powiększenie */
.lightbox {
    position: fixed;
    display: none;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.lightbox img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 20px;
}

/* ❤️ serca */
.heart {
    position: fixed;
    bottom: -10px;
    color: rgba(255,255,255,0.8);
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    to {
        transform: translateY(-100vh);
        opacity: 0;
    }
}

/* ✨ animacja wejścia */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

footer {
    margin: 40px;
    font-size: 18px;
}
</style>
</head>

<body>

<header>❤️ Kocham Cię ❤️</header>

<div class="love-text">
    Jesteś najważniejszą osobą w moim życiu 💕  
    Każdy dzień z Tobą to coś wyjątkowego  
    Dziękuję, że jesteś ❤️
</div>

<div id="timer"></div>

<!-- 📸 DUŻA GALERIA -->
<div class="gallery">
    <img src="img1.jpg" onclick="openImg(this)">
    <img src="img2.jpg" onclick="openImg(this)">
    <img src="img3.jpg" onclick="openImg(this)">
    <img src="img4.jpg" onclick="openImg(this)">
    <img src="img5.jpg" onclick="openImg(this)">
    <img src="img6.jpg" onclick="openImg(this)">
    <img src="img7.jpg" onclick="openImg(this)">
    <img src="img8.jpg" onclick="openImg(this)">
    <img src="img9.jpg" onclick="openImg(this)">
    <img src="img10.jpg" onclick="openImg(this)">
</div>

<!-- 🔍 powiększenie -->
<div class="lightbox" id="lightbox" onclick="closeImg()">
    <img id="lightbox-img">
</div>

<footer>Na zawsze Twój ❤️</footer>

<script>
// ⏳ LICZNIK
const startDate = new Date("2025-06-07T00:00:00");

function updateTimer() {
    const now = new Date();
    const diff = now - startDate;

    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff / (1000*60*60)) % 24);
    const minutes = Math.floor((diff / (1000*60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("timer").innerHTML =
        `Jesteśmy razem: ${days} dni ${hours}h ${minutes}m ${seconds}s ❤️`;
}

setInterval(updateTimer, 1000);
updateTimer();

// 💖 serduszka
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 25) + "px";
    heart.style.animationDuration = (3 + Math.random() * 5) + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 8000);
}

setInterval(createHeart, 300);

// 🔍 powiększanie zdjęć
function openImg(img) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = img.src;
}

function closeImg() {
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
